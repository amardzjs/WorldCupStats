<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>FIFA World Cup 2026 · Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;min-width:0}
:root{
  --bg0:#050816;--bg1:#0D1324;--bg2:#111827;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --cyan:#00E5FF;--cyan-lo:rgba(0,229,255,0.1);--cyan-glow:rgba(0,229,255,0.3);
  --blue:#3B82F6;--blue-lo:rgba(59,130,246,0.1);
  --gold:#F59E0B;--gold-lo:rgba(245,158,11,0.1);
  --purple:#8B5CF6;--purple-lo:rgba(139,92,246,0.1);
  --green:#10B981;--green-lo:rgba(16,185,129,0.1);
  --red:#EF4444;--red-lo:rgba(239,68,68,0.1);
  --text:#F1F5F9;--text2:#94A3B8;--text3:#4B5563;
  --r:14px;--r-sm:10px;--r-xs:7px;
  --sh:0 4px 30px rgba(0,0,0,0.5);--sh-lg:0 8px 60px rgba(0,0,0,0.7);
  --tr:.18s cubic-bezier(.4,0,.2,1);
  --gutter:16px;
}
html{scroll-behavior:smooth;width:100%;overflow-x:hidden}
body{
  background:var(--bg0);color:var(--text);font-family:'Inter',system-ui,sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  width:100%;overflow-x:hidden;max-width:100vw;
}
a{color:var(--cyan);text-decoration:none}
button{cursor:pointer;font-family:inherit}
img{display:block;max-width:100%}
table{max-width:100%}

/* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══════════════════════════════════════════
   PARTICLES BG
═══════════════════════════════════════════ */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:float linear infinite;opacity:0}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.6}90%{opacity:.2}100%{transform:translateY(-20px) scale(1);opacity:0}}

/* ═══════════════════════════════════════════
   SOURCE BAR
═══════════════════════════════════════════ */
.source-bar{
  position:relative;z-index:10;width:100%;
  background:linear-gradient(90deg,rgba(0,229,255,0.06),rgba(59,130,246,0.06));
  border-bottom:1px solid rgba(0,229,255,0.12);
  padding:6px 12px;display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:10.5px;color:var(--text2);flex-wrap:wrap;text-align:center;
}
.source-bar a{color:var(--cyan);font-weight:500}
#data-status strong{color:var(--cyan)}
.refresh-btn{
  background:var(--cyan-lo);border:1px solid rgba(0,229,255,0.2);
  border-radius:6px;color:var(--cyan);padding:3px 9px;font-size:10.5px;
  display:inline-flex;align-items:center;gap:4px;transition:var(--tr);flex-shrink:0;
}
.refresh-btn:hover{background:rgba(0,229,255,0.18)}

/* ═══════════════════════════════════════════
   TOPBAR / NAV
═══════════════════════════════════════════ */
.topbar{
  position:sticky;top:0;z-index:200;width:100%;
  background:rgba(5,8,22,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border2);
  padding:0 20px;height:58px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 0 16px var(--cyan-glow);flex-shrink:0;
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{box-shadow:0 0 16px var(--cyan-glow)}50%{box-shadow:0 0 28px var(--cyan-glow)}}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:.5px;white-space:nowrap}
.logo-text span{color:var(--cyan)}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{
  padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;
  color:var(--text2);border:none;background:none;transition:var(--tr);
  display:flex;align-items:center;gap:6px;white-space:nowrap;position:relative;flex-shrink:0;
}
.nav-tab i{font-size:14px}
.nav-tab:hover{color:var(--text);background:var(--glass2)}
.nav-tab.active{color:var(--cyan);background:var(--cyan-lo)}
.nav-tab.active::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:var(--cyan);border-radius:2px 2px 0 0;box-shadow:0 0 8px var(--cyan)}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.page{position:relative;z-index:1;width:100%;overflow-x:hidden}
.content{padding:24px var(--gutter);max-width:1120px;margin:0 auto;width:100%}
.tab-panel{display:none;animation:fadeUp .25s ease both;width:100%}
.tab-panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════
   GLASS CARD
═══════════════════════════════════════════ */
.g-card{
  background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border:1px solid var(--border2);border-radius:var(--r);
  backdrop-filter:blur(20px);box-shadow:var(--sh);transition:var(--tr);
  width:100%;
}
.g-card:hover{border-color:rgba(255,255,255,0.18)}
.g-card-p{padding:18px}

/* ═══════════════════════════════════════════
   SECTION TITLE
═══════════════════════════════════════════ */
.sec-title{
  font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.3px;
  color:var(--text);display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap;
}
.sec-title::after{content:'';flex:1;min-width:20px;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.sec-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.si-cyan{background:var(--cyan-lo);color:var(--cyan)}
.si-gold{background:var(--gold-lo);color:var(--gold)}
.si-green{background:var(--green-lo);color:var(--green)}
.si-purple{background:var(--purple-lo);color:var(--purple)}
.si-blue{background:var(--blue-lo);color:var(--blue)}

/* ═══════════════════════════════════════════
   FLAGS — fixed identical box for perfect alignment
═══════════════════════════════════════════ */
.flag-box{
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  width:24px;height:24px;border-radius:50%;overflow:hidden;
  background:rgba(255,255,255,0.06);border:1px solid var(--border2);
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.flag-box img{width:100%;height:100%;object-fit:cover}
.flag-box.sm{width:18px;height:18px}
.flag-box.lg{width:36px;height:36px;border-width:2px}
.flag-box.xl{width:48px;height:48px;border-width:2px}
.flag-box.hero{width:72px;height:72px;border-width:3px}
.flag-box .fallback{font-size:12px;line-height:1}

/* ═══════════════════════════════════════════
   HERO SECTION
═══════════════════════════════════════════ */
.hero-wrap{position:relative;margin-bottom:20px;overflow:hidden;border-radius:var(--r);width:100%}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#050816 0%,#0a1628 40%,#0d1f3c 70%,#050816 100%);z-index:0}
.hero-bg::before{content:'';position:absolute;top:-40%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,0.08) 0%,transparent 70%)}
.hero-bg::after{content:'⚽';position:absolute;right:2%;top:50%;transform:translateY(-50%);font-size:160px;opacity:0.03;line-height:1}
.hero-content{position:relative;z-index:1;padding:28px var(--gutter);display:flex;flex-direction:column;gap:24px}
.hero-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--cyan);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hero-eyebrow::before{content:'';width:20px;height:2px;background:var(--cyan);border-radius:2px;box-shadow:0 0 8px var(--cyan)}
.hero-big-num{
  font-family:'Barlow Condensed',sans-serif;font-size:84px;font-weight:900;line-height:.85;letter-spacing:-2px;
  background:linear-gradient(135deg,#ffffff 20%,var(--cyan) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-label{font-size:14px;color:var(--text2);font-weight:400;margin-top:8px;line-height:1.4}
.hero-progress{margin-top:18px}
.hero-prog-label{font-size:11px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between;gap:8px}
.hero-prog-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.hero-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--blue));transition:width 1s ease;box-shadow:0 0 8px var(--cyan)}
.hero-mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:20px}
.hero-stat{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--r-xs);padding:10px 6px;text-align:center;transition:var(--tr)}
.hs-num{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;line-height:1}
.hs-lbl{font-size:9px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.hero-right-col{display:grid;grid-template-columns:1fr;gap:8px}
.hero-qs{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;transition:var(--tr)}
.hqs-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hqs-body{flex:1;min-width:0;overflow:hidden}
.hqs-lbl{font-size:11.5px;font-weight:600;color:var(--text)}
.hqs-sub{font-size:9.5px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hqs-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;line-height:1;flex-shrink:0}

/* ═══════════════════════════════════════════
   SUMMARY STRIP
═══════════════════════════════════════════ */
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.s-pill{background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 6px;text-align:center;transition:var(--tr)}
.sp-num{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;line-height:1;color:var(--gold)}
.sp-lbl{font-size:9px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

/* ═══════════════════════════════════════════
   GRID LAYOUTS
═══════════════════════════════════════════ */
.grid-2{display:grid;grid-template-columns:1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr;gap:14px}

/* ═══════════════════════════════════════════
   MATCH CARDS — perfectly symmetrical
═══════════════════════════════════════════ */
.match-card{
  background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:9px;
  transition:var(--tr);position:relative;width:100%;
}
.match-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:var(--tr)}
.match-card:hover{border-color:var(--border2)}
.match-card:hover::before{background:var(--cyan)}
.mc-header{display:flex;align-items:center;gap:6px;padding:10px 14px 0;flex-wrap:wrap}
.mc-body{padding:10px 12px 12px}
.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;width:100%}
.mc-team{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;min-width:0;overflow:hidden}
.mc-team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-team.left{justify-content:flex-end;flex-direction:row-reverse}
.mc-team.right{justify-content:flex-start}
.mc-score-area{text-align:center;flex-shrink:0}
.mc-score{
  background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));
  border:1px solid var(--border2);border-radius:var(--r-xs);padding:5px 12px;
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;
  display:flex;gap:8px;align-items:center;min-width:64px;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
}
.mc-score .sep{color:var(--text3);font-size:12px;font-weight:400}
.mc-vs{padding:5px 10px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-xs);font-size:10.5px;color:var(--text3);min-width:36px;text-align:center}
.mc-ht{font-size:9px;color:var(--text3);text-align:center;margin-top:2px}
.mc-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:7px 12px;background:rgba(0,0,0,0.15);border-top:1px solid var(--border);font-size:10.5px;color:var(--text2)}
.mc-footer i{font-size:11px;color:var(--text3)}
.goals-row{padding:7px 12px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px;background:rgba(0,0,0,0.1)}
.g-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:10.5px;color:var(--text2);max-width:100%}
.g-chip .g-min{color:var(--text3);font-size:9.5px}
.g-chip .g-og{color:var(--red);font-size:8.5px;font-weight:700;background:var(--red-lo);padding:1px 4px;border-radius:3px}
.g-chip .g-pen{color:var(--gold);font-size:8.5px;font-weight:700;background:var(--gold-lo);padding:1px 4px;border-radius:3px}

/* chips / badges */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap;flex-shrink:0}
.c-cyan{background:var(--cyan-lo);color:var(--cyan);border:1px solid rgba(0,229,255,0.2)}
.c-green{background:var(--green-lo);color:var(--green);border:1px solid rgba(16,185,129,0.2)}
.c-gold{background:var(--gold-lo);color:var(--gold);border:1px solid rgba(245,158,11,0.2)}
.c-purple{background:var(--purple-lo);color:var(--purple);border:1px solid rgba(139,92,246,0.2)}
.c-red{background:var(--red-lo);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.c-blue{background:var(--blue-lo);color:var(--blue);border:1px solid rgba(59,130,246,0.2)}
.c-ft{background:rgba(16,185,129,0.12);color:var(--green);border:1px solid rgba(16,185,129,0.25);font-weight:700}

/* ═══════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════ */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.f-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:11.5px;font-weight:500;transition:var(--tr);flex-shrink:0}
.f-btn:hover{background:var(--glass2);color:var(--text)}
.f-btn.active{background:var(--cyan-lo);border-color:rgba(0,229,255,0.3);color:var(--cyan)}

/* ═══════════════════════════════════════════
   DATE HEADER
═══════════════════════════════════════════ */
.date-hdr{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--cyan);margin:16px 0 9px;display:flex;align-items:center;gap:7px}
.date-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,229,255,0.25),transparent)}

/* ═══════════════════════════════════════════
   STANDINGS TABLE — horizontal scroll on mobile
═══════════════════════════════════════════ */
.group-section{margin-bottom:32px}
.group-hdr{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--cyan);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.group-hdr::before{content:'';width:4px;height:16px;background:var(--cyan);border-radius:2px;box-shadow:0 0 8px var(--cyan)}
.standings-wrap{
  background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
  border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;
  width:100%;
}
.standings-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.st-table{width:100%;min-width:480px;border-collapse:collapse;font-size:12px}
.st-table thead tr{background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border2)}
.st-table th{color:var(--text2);font-weight:600;font-size:10px;padding:9px 8px;text-align:center;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.st-table th:first-child{text-align:left;padding-left:14px;position:sticky;left:0;background:inherit}
.st-table td{padding:9px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap}
.st-table td:first-child{text-align:left;padding-left:14px;font-weight:600;font-size:12.5px;position:sticky;left:0;background:var(--bg2)}
.st-table tbody tr:hover td:first-child{background:#1a2236}
.st-table tbody tr{transition:var(--tr)}
.st-table tbody tr:hover{background:rgba(255,255,255,0.03)}
.st-table tbody tr:last-child td{border-bottom:none}
.st-table tbody tr.qual td:first-child{border-left:3px solid var(--cyan);padding-left:11px}
.st-table tbody tr.qual{background:rgba(0,229,255,0.02)}
.pts-td{font-weight:800;color:var(--cyan);font-size:13px}
.gd-pos{color:var(--green);font-weight:600}
.gd-neg{color:var(--red);font-weight:600}
.team-cell{display:flex;align-items:center;gap:7px}

/* group match rows */
.gm-rows{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.gm-row{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--r-xs);padding:9px 12px;display:flex;align-items:center;gap:8px;transition:var(--tr);width:100%}
.gm-row:hover{background:rgba(255,255,255,0.04);border-color:var(--border2)}
.gm-teams{flex:1;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;min-width:0}
.gm-t{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;min-width:0;overflow:hidden}
.gm-t span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gm-t.r{justify-content:flex-end;flex-direction:row-reverse}
.gm-sc{background:rgba(255,255,255,0.07);border-radius:5px;padding:3px 9px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;display:flex;gap:6px;align-items:center;min-width:52px;justify-content:center}
.gm-sc .sep{color:var(--text3);font-size:10px;font-weight:400}
.gm-vs{padding:3px 7px;background:rgba(255,255,255,0.03);border-radius:5px;font-size:10px;color:var(--text3);min-width:32px;text-align:center}
.gm-meta{font-size:9.5px;color:var(--text3);white-space:nowrap;flex-shrink:0}

/* ═══════════════════════════════════════════
   SCORER LEADERBOARD — used inside Stats now
═══════════════════════════════════════════ */
.scorer-board{background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid var(--border);border-radius:var(--r);overflow:hidden;width:100%}

<body>

<script>
/* ═══════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════ */
(function(){
  const c=document.getElementById('particles');
  const n=window.innerWidth<640?8:18;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='particle';
    const sz=Math.random()*3+1;
    const colors=['rgba(0,229,255,0.5)','rgba(59,130,246,0.5)','rgba(139,92,246,0.4)','rgba(245,158,11,0.3)'];
    Object.assign(p.style,{
      width:sz+'px',height:sz+'px',left:Math.random()*100+'%',
      background:colors[Math.floor(Math.random()*colors.length)],
      animationDuration:(Math.random()*20+15)+'s',
      animationDelay:(-Math.random()*20)+'s',
    });
    c.appendChild(p);
  }
})();

/* ═══════════════════════════════════════════
   DATA SOURCES
═══════════════════════════════════════════ */
const RAW='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
const SOURCES=[
  '/.netlify/functions/proxy',
  'https://api.allorigins.win/raw?url='+encodeURIComponent(RAW),
  'https://corsproxy.io/?url='+encodeURIComponent(RAW),
  RAW,
  'https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json',
];

/* ═══════════════════════════════════════════
   COUNTRY CODES → flagcdn.com
═══════════════════════════════════════════ */
const CC={
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Canada':'ca','Qatar':'qa',
  'Switzerland':'ch','Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
  'USA':'us','Paraguay':'py','Australia':'au','Turkey':'tr','Germany':'de',
  "Ivory Coast":'ci',"Côte d'Ivoire":'ci','Ecuador':'ec','Netherlands':'nl',
  'Japan':'jp','Sweden':'se','Tunisia':'tn','Belgium':'be','Egypt':'eg',
  'Iran':'ir','New Zealand':'nz','Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa',
  'Uruguay':'uy','France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo','Portugal':'pt',
  'DR Congo':'cd','Uzbekistan':'uz','Colombia':'co','England':'gb-eng',
  'Croatia':'hr','Ghana':'gh','Panama':'pa','Curaçao':'cw',
  'Bosnia & Herzegovina':'ba','Bosnia-Herzegovina':'ba',
  'Czech Republic':'cz','Czechia':'cz',
};

function flagImg(team,size=''){
  const code=CC[team];
  if(!code)return`<span class="flag-box${size?' '+size:''}"><span class="fallback">🏴</span></span>`;
  return`<span class="flag-box${size?' '+size:''}"><img src="https://flagcdn.com/w80/${code}.png" alt="${team}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'fallback\\'>🏴</span>'"></span>`;
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let MATCHES=[];
let matchFilter='all';
let selectedTeam=null;
let refreshTimer=null;
let prevDoneCount=0;
const REFRESH_MS=2*60*1000;
const GROUPS_MAP={};

/* ═══════════════════════════════════════════
   NORMALIZE
═══════════════════════════════════════════ */
function normalize(raw){
  return raw.matches.map(m=>{
    const n={...m};
    if(m.score?.ft){n.score1=m.score.ft[0];n.score2=m.score.ft[1];}
    if(m.score?.ht){n.ht1=m.score.ht[0];n.ht2=m.score.ht[1];}
    const g1=(m.goals1||[]).map(g=>({...g,team:m.team1}));
    const g2=(m.goals2||[]).map(g=>({...g,team:m.team2}));
    n.goals=[...g1,...g2].sort((a,b)=>(parseInt(a.minute)||0)-(parseInt(b.minute)||0));
    n.isKnockout=!m.group;
    if(m.group){GROUPS_MAP[m.team1]=m.group;GROUPS_MAP[m.team2]=m.group;}
    return n;
  });
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const fmtDate=d=>new Date(d+'T00:00:00Z').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'UTC'});
const fmtTime=d=>d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
const isCompleted=m=>m.score1!==undefined&&m.score1!==null;
const isGroupM=m=>Boolean(m.group);
const isKnockout=m=>m.isKnockout;
const isPlaceholder=t=>/winner|loser|path|^W\d|^L\d|^[12][A-Z]$|^[0-9]/i.test(t||'');

function getGroups(matches){
  const g={};
  matches.filter(isGroupM).forEach(m=>{
    if(!g[m.group])g[m.group]=[];
    [m.team1,m.team2].forEach(t=>{if(!g[m.group].includes(t))g[m.group].push(t);});
  });
  return g;
}
function getTeams(matches){
  const s=new Set();
  matches.filter(isGroupM).forEach(m=>{
    if(!isPlaceholder(m.team1))s.add(m.team1);
    if(!isPlaceholder(m.team2))s.add(m.team2);
  });
  return[...s].sort();
}

/* ═══════════════════════════════════════════
   STANDINGS
═══════════════════════════════════════════ */
function computeStandings(matches){
  const s={};
  matches.filter(m=>isGroupM(m)&&isCompleted(m)).forEach(m=>{
    [m.team1,m.team2].forEach(t=>{if(!s[t])s[t]={team:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
    const[s1,s2]=[m.score1,m.score2];
    s[m.team1].p++;s[m.team2].p++;
    s[m.team1].gf+=s1;s[m.team1].ga+=s2;s[m.team2].gf+=s2;s[m.team2].ga+=s1;
    if(s1>s2){s[m.team1].w++;s[m.team1].pts+=3;s[m.team2].l++;}
    else if(s1<s2){s[m.team2].w++;s[m.team2].pts+=3;s[m.team1].l++;}
    else{s[m.team1].d++;s[m.team1].pts++;s[m.team2].d++;s[m.team2].pts++;}
  });
  Object.values(s).forEach(t=>t.gd=t.gf-t.ga);
  return s;
}

/* ═══════════════════════════════════════════
   SCORERS — assists not present in source data
═══════════════════════════════════════════ */
function computeScorers(matches){
  const sc={};
  matches.filter(isCompleted).forEach(m=>{
    (m.goals||[]).forEach(g=>{
      if(g.owngoal)return;
      const k=g.name+'|'+g.team;
      if(!sc[k])sc[k]={name:g.name,team:g.team,goals:0};
      sc[k].goals++;
    });
  });
  return{scorers:Object.values(sc),assists:[]};
}
function topGroup(arr,key){
  if(!arr.length)return[];
  const max=Math.max(...arr.map(x=>x[key]));
  return arr.filter(x=>x[key]===max).sort((a,b)=>a.name.localeCompare(b.name));
}

const TAB_ORDER=['overview','groups','teams','bracket','stats'];
function showTab(tab){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab,.mn-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  const i=TAB_ORDER.indexOf(tab);
  document.querySelectorAll('.nav-tab')[i]?.classList.add('active');
  document.querySelectorAll('.mn-btn')[i]?.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(MATCHES.length)renderTab(tab);
}
function currentTab(){return document.querySelector('.tab-panel.active')?.id?.replace('tab-','')||'overview';}
function renderTab(tab){
  const st=computeStandings(MATCHES);
  const{scorers,assists}=computeScorers(MATCHES);
  ({
    overview:()=>renderOverview(MATCHES,st,scorers,assists),
    groups:  ()=>renderGroups(MATCHES,st),
    teams:   ()=>renderTeams(MATCHES,st),
    bracket: ()=>renderBracket(MATCHES),
    stats:   ()=>renderStats(MATCHES,st,scorers,assists),
  })[tab]?.();
}

let chartInstances={};
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}

function renderStats(matches,standings,scorers,assists){
  const done=matches.filter(isCompleted);
  const total=done.reduce((s,m)=>s+m.score1+m.score2,0);
  const avg=done.length?total/done.length:0;
  const hs=done.reduce((b,m)=>{const t=m.score1+m.score2;return t>b.total?{total:t,match:m}:b;},{total:0,match:null});
  const tg={};
  done.forEach(m=>{tg[m.team1]=(tg[m.team1]||0)+m.score1;tg[m.team2]=(tg[m.team2]||0)+m.score2;});
  const topT=Object.entries(tg).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topS=[...scorers].sort((a,b)=>b.goals-a.goals).slice(0,8);
  const topA=[...assists].sort((a,b)=>b.assists-a.assists).slice(0,8);
  const maxTG=topT[0]?topT[0][1]:1;

  // Group goals
  const groupGoals={};
  done.filter(isGroupM).forEach(m=>{
    groupGoals[m.group]=(groupGoals[m.group]||0)+m.score1+m.score2;
  });

  let h=`
  <div class="sec-title"><div class="sec-icon si-cyan"><i class="ti ti-chart-bar"></i></div>Tournament Statistics</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px">
    <div class="s-pill"><div class="sp-num">${total}</div><div class="sp-lbl">Total Goals</div></div>
    <div class="s-pill"><div class="sp-num">${avg.toFixed(2)}</div><div class="sp-lbl">Goals/match</div></div>
    <div class="s-pill"><div class="sp-num">${done.length}</div><div class="sp-lbl">Played</div></div>
    <div class="s-pill"><div class="sp-num">${scorers.length}</div><div class="sp-lbl">Goalscorers</div></div>

  </div>`;

  if(hs.match){
    const m=hs.match;
    h+=`<div class="sec-title"><div class="sec-icon si-gold"><i class="ti ti-trophy"></i></div>Highest-Scoring Match</div>
    <div class="g-card g-card-p" style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="flex:1;display:flex;align-items:center;justify-content:flex-end;gap:8px;font-size:15px;font-weight:700">${flagImg(m.team1,'lg')} ${m.team1}</div>
        <div class="mc-score">${m.score1}<span class="sep">—</span>${m.score2}</div>
        <div style="flex:1;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700">${flagImg(m.team2,'lg')} ${m.team2}</div>
        <span class="chip c-cyan">${hs.total} goals</span>
      </div>
      ${goalsHtml(m)}
    </div>`;
  }

  h+=`<div class="grid-2">`;

  // Goals by team bar chart
  h+=`<div>
    <div class="sec-title"><div class="sec-icon si-green"><i class="ti ti-shield"></i></div>Goals by Team</div>
    <div class="chart-card">`;
  if(!topT.length){
    h+=`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No data yet</div></div>`;
  } else {
    h+=`<div class="bar-chart-wrap">`;
    topT.forEach(([team,goals])=>{
      const pct=Math.round((goals/maxTG)*100);
      h+=`<div class="bc-item">
        <div class="bc-lbl">
          <span style="display:flex;align-items:center;gap:6px">${flagImg(team,'sm')} ${team}</span>
          <span class="v">${goals}</span>
        </div>
        <div class="bc-bar-bg"><div class="bc-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div></div>`;

  // Goals by group chart (Chart.js)
  h+=`<div>
    <div class="sec-title"><div class="sec-icon si-purple"><i class="ti ti-chart-pie"></i></div>Goals by Group</div>
    <div class="chart-card">
      ${Object.keys(groupGoals).length
        ?`<div class="chart-wrap"><canvas id="groupChart"></canvas></div>`
        :`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">No data yet</div></div>`}
    </div>
  </div></div>`;

  h+=`<div class="grid-2" style="margin-top:16px">`;

  // Top scorers list
  h+=`<div>
    <div class="sec-title"><div class="sec-icon si-cyan"><i class="ti ti-star"></i></div>Top Scorers</div>
    <div class="scorer-board">`;
  if(!topS.length)h+=`<div class="empty-state" style="padding:24px"><div class="empty-icon">⚽</div><div class="empty-title">None yet</div></div>`;
  const mxSS=topS[0]?.goals||1;
  topS.forEach((p,i)=>h+=scorerRowHtml(p,i,'goals','goals','sc-bar-goals',mxSS));
  h+=`</div></div>`;

  h+=`</div></div>`;

  document.getElementById('tab-stats').innerHTML=h;

  // Render Chart.js doughnut
  if(Object.keys(groupGoals).length){
    setTimeout(()=>{
      destroyChart('groupChart');
      const ctx=document.getElementById('groupChart');
      if(!ctx)return;
      const labels=Object.keys(groupGoals).sort();
      const data=labels.map(g=>groupGoals[g]);
      const colors=['#00E5FF','#3B82F6','#8B5CF6','#F59E0B','#10B981','#EF4444','#F97316','#06B6D4','#84CC16','#EC4899','#6366F1','#14B8A6'];
      chartInstances['groupChart']=new Chart(ctx,{
        type:'doughnut',
        data:{
          labels,
          datasets:[{data,backgroundColor:colors.slice(0,labels.length),borderWidth:0,hoverOffset:8}]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{position:'right',labels:{color:'#94A3B8',font:{size:11},padding:12,boxWidth:12,borderRadius:3}},
            tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw} goals`}}
          },
          animation:{duration:800,easing:'easeInOutQuart'}
        }
      });
    },50);
  }
}

/* ═══════════════════════════════════════════
   DATA LOADER
═══════════════════════════════════════════ */
async function tryFetch(url){
  const sep=url.includes('?')?'&':'?';
  const r=await fetch(url+sep+'_='+Date.now(),{
    cache:'no-store',
    headers:{'Cache-Control':'no-cache, no-store','Pragma':'no-cache'}
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
  const data=await r.json();
  if(!data||!Array.isArray(data.matches))throw new Error('Unexpected JSON');
  return data;
}

async function loadData(silent=false){
  if(!silent)document.getElementById('data-status').textContent='Connecting…';
  else       document.getElementById('data-status').textContent='↻ Refreshing…';
  let lastErr;
  for(const url of SOURCES){
    try{
      const fresh=await tryFetch(url);
      MATCHES=normalize(fresh);
      const done=MATCHES.filter(isCompleted).length;
      const isNew=done>prevDoneCount&&prevDoneCount>=0&&silent;
      prevDoneCount=done;
      const now=fmtTime(new Date());
      document.getElementById('data-status').innerHTML=
        `✓ ${MATCHES.length} fixtures &nbsp;·&nbsp; <strong>${done} results</strong> &nbsp;·&nbsp; ${now}`+
        (isNew?` &nbsp;<span style="color:var(--green);font-weight:600;animation:fadeUp .3s ease">● New results!</span>`:'');
      if(!silent){
        document.getElementById('loading').style.display='none';
        document.getElementById('app').style.display='block';
        renderTab('overview');
      } else {
        renderTab(currentTab());
      }
      clearTimeout(refreshTimer);
      refreshTimer=setTimeout(()=>loadData(true),REFRESH_MS);
      return;
    }catch(e){lastErr=e;}
  }
  document.getElementById('data-status').innerHTML=`<span style="color:var(--red)">✗ Failed (${lastErr?.message})</span>`;
  if(!silent){
    document.getElementById('loading').innerHTML=`
      <div style="padding:40px 20px">
        <div class="error-box">
          <strong>⚠️ Could not load tournament data</strong><br>
          <em style="color:var(--text2);font-size:12px">${lastErr?.message}</em><br><br>
          All data sources failed to respond. This is usually a temporary network issue.<br><br>
          <button onclick="manualRefresh()" style="background:var(--cyan-lo);border:1px solid rgba(0,229,255,0.3);border-radius:8px;color:var(--cyan);padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px">
            🔄 Try Again
          </button>
        </div>
      </div>`;
    document.getElementById('loading').style.background='var(--bg0)';
  }
  clearTimeout(refreshTimer);
  refreshTimer=setTimeout(()=>loadData(silent),REFRESH_MS);
}
window.manualRefresh=()=>{clearTimeout(refreshTimer);loadData(true);};
loadData();
</script>
